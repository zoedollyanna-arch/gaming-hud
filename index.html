<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Arcade Hub</h1>
        <p>Your destination for fun browser games</p>
    </header>

    <main>
        <section class="games-section">
            <h2>Featured Games</h2>
            <div class="games-container">
                <div class="game-card" data-game="snake">
                    <div class="game-icon">🐍</div>
                    <h3>Snake</h3>
                    <p>Classic snake game</p>
                    <button type="button" class="play-btn">Play Now</button>
                </div>
                <div class="game-card" data-game="memory">
                    <div class="game-icon">🧠</div>
                    <h3>Memory Match</h3>
                    <p>Test your memory</p>
                    <button type="button" class="play-btn">Play Now</button>
                </div>
                <div class="game-card" data-game="clicker">
                    <div class="game-icon">🖱️</div>
                    <h3>Clicker Game</h3>
                    <p>Click as fast as you can</p>
                    <button type="button" class="play-btn">Play Now</button>
                </div>
            </div>
        </section>

        <section class="game-area" id="gameArea">
            <h2 id="currentGameTitle">Select a game to play</h2>
            <div class="game-canvas-container">
                <canvas id="gameCanvas" width="600" height="400"></canvas>
            </div>
            <div class="game-controls">
                <p id="gameInstructions">Click on any game card above to start playing!</p>
                <button id="resetBtn" class="hidden">Reset Game</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Arcade Hub. Built for learning.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
